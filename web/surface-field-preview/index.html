<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Rusty Optics Surface Field</title>
    <link rel="stylesheet" href="styles.css?v=surface-field-circuit">
  </head>
  <body>
    <main class="app">
      <div class="toolbar" aria-label="Surface field controls">
        <label>
          View
          <select id="view-mode">
            <option value="surface" selected>Surface</option>
            <option value="circuit">Circuit</option>
            <option value="planarian">Planarian</option>
          </select>
        </label>
        <label>
          Layer
          <select id="scalar-layer"></select>
        </label>
        <label><input id="toggle-live" type="checkbox" checked> Live</label>
        <output id="runtime-status">sequence</output>
        <button id="toggle-play" type="button">Play</button>
        <label class="frame-control">
          Frame
          <input id="frame-slider" type="range" min="0" max="0" value="0">
        </label>
        <output id="frame-position">0/0</output>
        <label>
          Speed
          <select id="playback-speed">
            <option value="0.5">0.5x</option>
            <option value="1" selected>1x</option>
            <option value="2">2x</option>
            <option value="4">4x</option>
          </select>
        </label>
        <label><input id="toggle-edges" type="checkbox" checked> Edges</label>
        <label><input id="toggle-tier2" type="checkbox" checked> Tier 2</label>
        <label><input id="toggle-regions" type="checkbox" checked> Regions</label>
        <label><input id="toggle-polarity" type="checkbox" checked> Vectors</label>
        <label><input id="toggle-labels" type="checkbox"> Labels</label>
        <button id="reset-view" type="button">Reset</button>
        <output id="stats">Loading</output>
      </div>
      <canvas id="viewport"></canvas>
    </main>
    <script src="app.js?v=surface-field-circuit"></script>
  </body>
</html>

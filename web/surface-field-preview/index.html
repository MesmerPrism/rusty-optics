<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Rusty Optics Surface Field</title>
    <link rel="stylesheet" href="styles.css">
  </head>
  <body>
    <main class="app">
      <div class="toolbar" aria-label="Surface field controls">
        <label>
          Scalar
          <select id="scalar-layer"></select>
        </label>
        <label><input id="toggle-edges" type="checkbox" checked> Edges</label>
        <label><input id="toggle-tier2" type="checkbox" checked> Tier 2</label>
        <label><input id="toggle-regions" type="checkbox" checked> Regions</label>
        <label><input id="toggle-polarity" type="checkbox" checked> Polarity</label>
        <label><input id="toggle-labels" type="checkbox"> Labels</label>
        <button id="reset-view" type="button">Reset</button>
        <output id="stats">Loading</output>
      </div>
      <canvas id="viewport"></canvas>
    </main>
    <script src="app.js"></script>
  </body>
</html>
